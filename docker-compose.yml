services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mlflow:
    build: .
    entrypoint: []
    environment:
      MLFLOW_ALLOW_FILE_STORE: "true"
    command: ["uv", "run", "mlflow", "server",
              "--host", "0.0.0.0", "--port", "5000",
              "--backend-store-uri", "/mlflow",
              "--allowed-hosts", "localhost,127.0.0.1,localhost:5050,127.0.0.1:5050,mlflow,mlflow:5000,mlflow.${DOMAIN:-localhost}"]
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5050:5000"   # host 5000 is taken by macOS AirPlay Receiver
    restart: unless-stopped

  app:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      OLA_DB_PATH: /app/data/ola.db
      NEO4J_URI: bolt://neo4j:7687
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT: ola-dev
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      mlflow:
        condition: service_started
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
      - mlflow
    restart: unless-stopped

volumes:
  neo4j_data:
  mlflow_data:
  caddy_data:
  caddy_config:
